<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitación Dulces 16</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- PANTALLA INICIAL -->
<div id="start-screen">
    
    <div class="fairy-start" id="fairy-btn">
        <!-- HADA SVG -->
        <svg viewBox="0 0 100 100" class="fairy-svg">
            
            <!-- Alas -->
            <ellipse class="wing left" cx="30" cy="50" rx="20" ry="30"/>
            <ellipse class="wing right" cx="70" cy="50" rx="20" ry="30"/>

            <!-- Cuerpo -->
            <circle cx="50" cy="50" r="8" fill="#ffd700"/>
        </svg>
    </div>

    <p>Toca el hada para comenzar</p>
</div>

<!-- INVITACIÓN -->
<div class="scene hidden">

    <div class="forest"></div>
    <div id="fairy-container"></div>

    <div class="content">
        <p class="intro">
            Bajo un cielo de luces y flores,<br>
            te invitamos a celebrar un momento especial...
        </p>

        <h1>Karani</h1>
        <h2>celebra sus</h2>

        <h3 class="dulces">
            <span>Dulces 16</span>
        </h3>

        <p class="details">
            8 de agosto del 2026<br>
            19:00 horas<br>
            Toluca, Estado de México
        </p>

        <p class="footer">
            Será una noche mágica que no querrás perderte...
        </p>
    </div>
</div>

<!-- AUDIO -->
<audio id="bg-music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
